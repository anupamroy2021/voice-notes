<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes AI | Pro Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --card: #161618;
      --card-hover: #1c1c1f;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --text: #f4f4f5;
      --text-dim: #71717a;
      --text-dimmer: #3f3f46;
      --accent: #e4ff4b;
      --accent-dim: rgba(228,255,75,0.12);
      --accent-glow: rgba(228,255,75,0.25);
      --red: #ff4b4b;
      --red-dim: rgba(255,75,75,0.12);
      --green: #4bffb0;
      --green-dim: rgba(75,255,176,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    .ambient {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }
    .ambient-1 { background: var(--accent); top: -200px; left: -100px; }
    .ambient-2 { background: #5f4bff; bottom: -200px; right: -100px; opacity: 0.08; }

    /* ── LAYOUT ── */
    .app-wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 1.5rem 6rem;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .wordmark-voice {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .wordmark-notes {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--accent);
    }

    .pill-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ── RECORDER STAGE ── */
    .recorder-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    /* ── WAVEFORM RING ── */
    .ring-container {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: spin 8s linear infinite;
    }

    .ring-svg.paused { animation-play-state: paused; }
    .ring-svg circle {
      fill: none;
      stroke: var(--border-bright);
      stroke-width: 1;
      stroke-dasharray: 4 8;
    }

    .ring-inner {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .ring-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04), transparent 60%);
      border-radius: 50%;
    }

    .ring-inner:hover {
      transform: scale(1.05);
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .ring-inner.recording {
      background: var(--red-dim);
      border-color: var(--red);
      box-shadow: 0 0 50px rgba(255,75,75,0.3);
      animation: recordPulse 2s ease-in-out infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(255,75,75,0.2); }
      50% { box-shadow: 0 0 60px rgba(255,75,75,0.5), 0 0 100px rgba(255,75,75,0.2); }
    }

    .mic-icon {
      width: 32px;
      height: 32px;
      transition: all 0.3s ease;
    }

    .ring-inner.recording .mic-icon { filter: brightness(2); }

    /* waveform bars around button */
    .waveform-bars {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: none;
    }
    .ring-inner.recording + .waveform-bars,
    .waveform-bars.active { display: block; }

    /* ── RECORD LABEL ── */
    .rec-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .rec-action {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.3s;
    }

    .rec-action.live {
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rec-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── LIVE TRANSCRIPT ── */
    .transcript-box {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      min-height: 72px;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .transcript-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(228,255,75,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .transcript-box.active { border-color: rgba(228,255,75,0.2); }
    .transcript-box.active::before { opacity: 1; }

    #liveTranscript {
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-dim);
      transition: color 0.3s;
    }

    .transcript-box.active #liveTranscript { color: var(--text); }

    /* ── SEARCH ── */
    .search-wrapper {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dimmer);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 13px 18px 13px 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    #searchInput::placeholder { color: var(--text-dimmer); }
    #searchInput:focus {
      border-color: var(--border-bright);
      background: var(--card);
    }

    /* ── SECTION HEADER ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      margin-bottom: 1rem;
    }

    /* ── NOTE CARDS ── */
    #cardsContainer { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .card:hover {
      border-color: var(--border-bright);
      transform: translateY(-1px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .card-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dimmer);
      letter-spacing: 0.05em;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--border-bright);
      color: var(--text);
    }

    .action-btn.btn-delete:hover {
      background: var(--red-dim);
      border-color: rgba(255,75,75,0.3);
      color: var(--red);
    }

    .card-summary {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      line-height: 1.4;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-body {
      padding: 1rem 1.5rem;
    }

    .bullet-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 4px;
    }

    .bullet-tag::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .bullets-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-footer {
      padding: 0.875rem 1.5rem;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--border);
    }

    .full-transcript {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dimmer);
      line-height: 1.7;
      font-style: italic;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-glyph {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      color: var(--text-dimmer);
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 0.875rem;
      color: var(--text-dimmer);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border-bright);
      color: var(--text);
      padding: 11px 20px;
      border-radius: 100px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 9999;
      white-space: nowrap;
    }

    #toast .toast-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    #toast.toast-danger .toast-dot { background: var(--red); }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dimmer); border-radius: 10px; }
  </style>
</head>
<body>

  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <div id="toast">
    <span class="toast-dot"></span>
    <span id="toastText">Saved</span>
  </div>

  <div class="app-wrapper">

    <!-- HEADER -->
    <header>
      <div class="wordmark">
        <span class="wordmark-voice">Voice</span><span class="wordmark-notes">Notes</span>
      </div>
      <span class="pill-badge">Pro Edition</span>
    </header>

    <!-- RECORDER -->
    <div class="recorder-stage">
      <div class="ring-container">
        <svg class="ring-svg paused" id="ringSvg" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="75" stroke-dasharray="3 9"/>
        </svg>
        <div class="ring-inner" id="recordBtn">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
      </div>

      <div class="rec-label">
        <span class="rec-action" id="recStatus">Tap to record</span>
      </div>

      <div class="transcript-box" id="transcriptBox">
        <div id="liveTranscript">Live transcript will appear here…</div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search your notes…">
    </div>

    <!-- NOTES -->
    <div class="section-label" id="notesLabel">Notes</div>
    <div id="cardsContainer"></div>

  </div>

  <script>
    let recognition = null;
    let isRecording = false;
    let finalAccumulated = '';
    let searchTerm = '';
    let notes = JSON.parse(localStorage.getItem('vnotes_v3')) || [];

    const recordBtn = document.getElementById('recordBtn');
    const liveTranscriptEl = document.getElementById('liveTranscript');
    const transcriptBox = document.getElementById('transcriptBox');
    const cardsContainer = document.getElementById('cardsContainer');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    const ringSvg = document.getElementById('ringSvg');
    const recStatus = document.getElementById('recStatus');
    const notesLabel = document.getElementById('notesLabel');

    window.onload = renderCards;

    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase();
      renderCards();
    });

    function showToast(message, type = 'success') {
      toastText.innerText = message;
      toast.className = type === 'success' ? 'show' : 'show toast-danger';
      setTimeout(() => toast.className = '', 2500);
    }

    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Browser not supported");
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const text = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalAccumulated += text + ' ';
          else interim += text;
        }
        liveTranscriptEl.innerText = finalAccumulated + interim;
      };
      recognition.onend = () => { if (isRecording) recognition.start(); };
      return recognition;
    }

    function toggleRecording() {
      if (!isRecording) {
        if (!recognition) recognition = initSpeech();
        finalAccumulated = '';
        liveTranscriptEl.innerText = 'Listening…';
        recognition.start();
        isRecording = true;
        recordBtn.classList.add('recording');
        ringSvg.classList.remove('paused');
        transcriptBox.classList.add('active');
        recStatus.innerHTML = '<span class="rec-dot"></span>Recording — tap to save';
        recStatus.classList.add('live');
      } else {
        isRecording = false;
        recognition.stop();
        recordBtn.classList.remove('recording');
        ringSvg.classList.add('paused');
        transcriptBox.classList.remove('active');
        recStatus.innerText = 'Tap to record';
        recStatus.classList.remove('live');
        if (finalAccumulated.trim()) {
          saveNote(finalAccumulated.trim());
          showToast('Note saved');
        }
        liveTranscriptEl.innerText = 'Live transcript will appear here…';
      }
    }

    function saveNote(text) {
      const newNote = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        transcript: text,
        summary: generateSummary(text),
        points: generateBullets(text)
      };
      notes.unshift(newNote);
      sync();
    }

    function deleteNote(id) {
      const confirmed = confirm("Delete this note? This cannot be undone.");
      if (confirmed) {
        notes = notes.filter(n => n.id !== id);
        sync();
        showToast("Note deleted", "danger");
      }
    }

    function copyNote(id) {
      const note = notes.find(n => n.id === id);
      const content = `Summary: ${note.summary}\nPoints:\n- ${note.points.join('\n- ')}`;
      navigator.clipboard.writeText(content).then(() => showToast("Copied"));
    }

    function editNote(id) {
      const note = notes.find(n => n.id === id);
      const newText = prompt("Edit content:", note.transcript);
      if (newText !== null) {
        note.transcript = newText;
        note.summary = generateSummary(newText);
        note.points = generateBullets(newText);
        sync();
        showToast("Note updated");
      }
    }

    function sync() {
      localStorage.setItem('vnotes_v3', JSON.stringify(notes));
      renderCards();
    }

    function generateSummary(t) {
      const words = t.split(' ');
      return words.slice(0, 10).join(' ') + (words.length > 10 ? '…' : '');
    }

    function generateBullets(t) {
      const parts = t.split(/[.!?]/).filter(s => s.trim().length > 5);
      return parts.length > 0 ? parts.slice(0, 3).map(s => s.trim()) : ["Key insight captured"];
    }

    function renderCards() {
      const filtered = notes.filter(n =>
        n.transcript.toLowerCase().includes(searchTerm) ||
        n.summary.toLowerCase().includes(searchTerm)
      );

      notesLabel.innerText = filtered.length > 0 ? `Notes · ${filtered.length}` : 'Notes';

      if (filtered.length === 0) {
        cardsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-glyph">∅</div>
            <p class="empty-text">${searchTerm ? 'No notes match your search.' : 'No notes yet. Tap the mic to begin.'}</p>
          </div>`;
        return;
      }

      cardsContainer.innerHTML = filtered.map((note, i) => `
        <div class="card" style="animation-delay:${i * 0.04}s">
          <div class="card-top">
            <div class="card-meta">
              <span class="card-date">${note.date}</span>
              <div class="card-actions">
                <button class="action-btn" onclick="copyNote(${note.id})">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  Copy
                </button>
                <button class="action-btn" onclick="editNote(${note.id})">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Edit
                </button>
                <button class="action-btn btn-delete" onclick="deleteNote(${note.id})">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                  Del
                </button>
              </div>
            </div>
            <div class="card-summary">${note.summary}</div>
          </div>
          <div class="card-body">
            <div class="bullets-list">
              ${note.points.map(p => `<div class="bullet-tag">${p}</div>`).join('')}
            </div>
          </div>
          <div class="card-footer">
            <div class="full-transcript">"${note.transcript}"</div>
          </div>
        </div>
      `).join('');
    }

    recordBtn.addEventListener('click', toggleRecording);
  </script>
</body>
</html>
