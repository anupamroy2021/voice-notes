<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Notes Pro | Dark Edition</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --accent: #38bdf8;
      --danger: #ef4444;
      --success: #22c55e;
      --border: #334155;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    /* Controls & Header */
    .header { text-align: center; margin-bottom: 3rem; }
    .controls { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    
    button {
      padding: 12px 24px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-recording { background: var(--danger); color: white; animation: pulse 2s infinite; }

    /* Live Preview */
    .live-preview-box {
      background: var(--card-bg);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 3rem;
      min-height: 60px;
    }
    #liveTranscript { color: var(--accent); }

    /* Cards */
    .card-grid { display: grid; gap: 1.5rem; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: var(--accent); }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .timestamp { font-size: 0.8rem; color: var(--text-dim); }
    
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      padding: 6px 12px;
      font-size: 0.75rem;
      background: #334155;
      color: var(--text-main);
    }
    .action-btn:hover { background: #475569; }
    .btn-delete:hover { background: var(--danger); }

    .summary-text { font-size: 1.1rem; color: var(--text-main); margin-bottom: 1rem; }
    .points-list { padding-left: 1.2rem; color: var(--text-dim); }
    .full-text { 
        font-size: 0.9rem; 
        color: var(--text-dim); 
        background: #0f172a; 
        padding: 10px; 
        border-radius: 8px;
        margin-top: 15px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>VoiceNotes <span style="color: var(--accent)">AI</span></h1>
    <p style="color: var(--text-dim)">Local-first, privacy-focused transcription</p>
  </div>
  
  <div class="controls">
    <button id="recordBtn" class="btn-primary">Start Recording</button>
    <span id="recStatus" style="color: var(--text-dim)">Microphone ready</span>
  </div>

  <div class="live-preview-box">
    <div style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase;">Live Feed</div>
    <div id="liveTranscript">Waiting for speech...</div>
  </div>

  <div class="card-grid" id="cardsContainer"></div>

  <script>
    // --- State & Storage ---
    let recognition = null;
    let isRecording = false;
    let finalAccumulated = '';
    let notes = JSON.parse(localStorage.getItem('vnotes_data')) || [];

    const recordBtn = document.getElementById('recordBtn');
    const recStatus = document.getElementById('recStatus');
    const liveTranscriptEl = document.getElementById('liveTranscript');
    const cardsContainer = document.getElementById('cardsContainer');

    // --- Init ---
    window.onload = renderCards;

    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Browser not supported");

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const text = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalAccumulated += text + ' ';
          else interim += text;
        }
        liveTranscriptEl.innerText = finalAccumulated + interim;
      };

      recognition.onend = () => { if (isRecording) recognition.start(); };
      return recognition;
    }

    // --- Actions ---
    function toggleRecording() {
      if (!isRecording) {
        if (!recognition) recognition = initSpeech();
        finalAccumulated = '';
        liveTranscriptEl.innerText = '';
        recognition.start();
        isRecording = true;
        recordBtn.innerText = "Stop & Save";
        recordBtn.className = "btn-recording";
        recStatus.innerText = "Listening actively...";
      } else {
        isRecording = false;
        recognition.stop();
        recordBtn.innerText = "Start Recording";
        recordBtn.className = "btn-primary";
        if (finalAccumulated.trim()) saveNote(finalAccumulated.trim());
        recStatus.innerText = "Saved to storage";
      }
    }

    function saveNote(text) {
      const newNote = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        transcript: text,
        summary: generateSummary(text),
        points: generateBullets(text)
      };
      notes.unshift(newNote);
      syncStorage();
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      syncStorage();
    }

    function copyNote(id) {
      const note = notes.find(n => n.id === id);
      const content = `Summary: ${note.summary}\n\nPoints:\n${note.points.join('\n')}`;
      navigator.clipboard.writeText(content);
      alert("Copied to clipboard!");
    }

    function editNote(id) {
      const note = notes.find(n => n.id === id);
      const newText = prompt("Edit Transcript:", note.transcript);
      if (newText) {
        note.transcript = newText;
        note.summary = generateSummary(newText);
        note.points = generateBullets(newText);
        syncStorage();
      }
    }

    function syncStorage() {
      localStorage.setItem('vnotes_data', JSON.stringify(notes));
      renderCards();
    }

    // --- Logic Helpers ---
    function generateSummary(t) {
        const words = t.split(' ');
        return words.length > 10 ? words.slice(0, 12).join(' ') + '...' : t;
    }

    function generateBullets(t) {
        const sentences = t.split(/[.!?]/).filter(s => s.trim().length > 4);
        return sentences.length > 0 ? sentences.slice(0, 3) : ["Point extracted from audio"];
    }

    function renderCards() {
      cardsContainer.innerHTML = notes.map(note => `
        <div class="card">
          <div class="card-header">
            <span class="timestamp">${note.date}</span>
            <div class="card-actions">
              <button class="action-btn" onclick="copyNote(${note.id})">Copy</button>
              <button class="action-btn" onclick="editNote(${note.id})">Edit</button>
              <button class="action-btn btn-delete" onclick="deleteNote(${note.id})">Del</button>
            </div>
          </div>
          <div class="summary-text">${note.summary}</div>
          <ul class="points-list">
            ${note.points.map(p => `<li>${p}</li>`).join('')}
          </ul>
          <div class="full-text">"${note.transcript}"</div>
        </div>
      `).join('');
    }

    recordBtn.addEventListener('click', toggleRecording);
  </script>
</body>
</html>
