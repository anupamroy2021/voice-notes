<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes AI | Pro Edition</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --accent: #38bdf8;
      --danger: #ef4444;
      --success: #10b981;
      --border: #334155;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    /* Header & Controls */
    .header { text-align: center; margin-bottom: 2rem; }
    .controls { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    
    button {
      padding: 12px 24px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-recording { background: var(--danger); color: white; animation: pulse 2s infinite; }

    /* Search Bar */
    .search-container { margin-bottom: 2rem; }
    #searchInput {
      width: 100%;
      padding: 14px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
    }
    #searchInput:focus { border-color: var(--accent); }

    /* Live Preview */
    .live-preview-box {
      background: var(--card-bg);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      min-height: 50px;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .timestamp { font-size: 0.8rem; color: var(--text-dim); }
    
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      padding: 6px 12px;
      font-size: 0.75rem;
      background: #334155;
      color: var(--text-main);
      border-radius: 6px;
    }
    .action-btn:hover { background: #475569; }
    .btn-delete:hover { background: var(--danger); color: white; }

    .summary-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--accent); }
    .points-list { padding-left: 1.2rem; color: var(--text-dim); margin-bottom: 1rem;}
    .full-text { font-size: 0.85rem; color: #64748b; font-style: italic; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }

    /* Toast Notification */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 1000;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>

  <div id="toast">Copied to clipboard!</div>

  <div class="header">
    <h1>VoiceNotes <span style="color: var(--accent)">AI</span></h1>
  </div>
  
  <div class="controls">
    <button id="recordBtn" class="btn-primary">Start Recording</button>
    <span id="recStatus" style="color: var(--text-dim)">Click to speak</span>
  </div>

  <div class="live-preview-box">
    <div id="liveTranscript" style="color: var(--text-dim)">Live transcript will appear here...</div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search notes by keyword...">
  </div>

  <div id="cardsContainer"></div>

  <script>
    let recognition = null;
    let isRecording = false;
    let finalAccumulated = '';
    let searchTerm = '';
    let notes = JSON.parse(localStorage.getItem('vnotes_v3')) || [];

    const recordBtn = document.getElementById('recordBtn');
    const liveTranscriptEl = document.getElementById('liveTranscript');
    const cardsContainer = document.getElementById('cardsContainer');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toast');

    window.onload = renderCards;

    // --- Search Logic ---
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase();
      renderCards();
    });

    // --- Feedback Helpers ---
    function showToast(message, type = 'success') {
      toast.innerText = message;
      toast.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return alert("Browser not supported");

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const text = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalAccumulated += text + ' ';
          else interim += text;
        }
        liveTranscriptEl.innerText = finalAccumulated + interim;
      };

      recognition.onend = () => { if (isRecording) recognition.start(); };
      return recognition;
    }

    function toggleRecording() {
      if (!isRecording) {
        if (!recognition) recognition = initSpeech();
        finalAccumulated = '';
        liveTranscriptEl.innerText = 'Listening...';
        recognition.start();
        isRecording = true;
        recordBtn.innerText = "Stop & Save";
        recordBtn.className = "btn-recording";
      } else {
        isRecording = false;
        recognition.stop();
        recordBtn.innerText = "Start Recording";
        recordBtn.className = "btn-primary";
        if (finalAccumulated.trim()) {
            saveNote(finalAccumulated.trim());
            showToast("Note Saved!");
        }
        liveTranscriptEl.innerText = 'Live transcript will appear here...';
      }
    }

    function saveNote(text) {
      const newNote = {
        id: Date.now(),
        date: new Date().toLocaleString(),
        transcript: text,
        summary: generateSummary(text),
        points: generateBullets(text)
      };
      notes.unshift(newNote);
      sync();
    }

    // --- Updated Card Actions ---
    function deleteNote(id) {
      // Confirmation Step
      const confirmed = confirm("Are you sure you want to delete this note? This cannot be undone.");
      if(confirmed) {
        notes = notes.filter(n => n.id !== id);
        sync();
        showToast("Note deleted", "danger");
      }
    }

    function copyNote(id) {
      const note = notes.find(n => n.id === id);
      const content = `Summary: ${note.summary}\nPoints:\n- ${note.points.join('\n- ')}`;
      
      navigator.clipboard.writeText(content).then(() => {
        showToast("Copied to clipboard!");
      });
    }

    function editNote(id) {
      const note = notes.find(n => n.id === id);
      const newText = prompt("Edit content:", note.transcript);
      if (newText !== null) { // Handle cancel button
        note.transcript = newText;
        note.summary = generateSummary(newText);
        note.points = generateBullets(newText);
        sync();
        showToast("Note updated");
      }
    }

    function sync() {
      localStorage.setItem('vnotes_v3', JSON.stringify(notes));
      renderCards();
    }

    // --- AI Simulation Logic ---
    function generateSummary(t) {
      const words = t.split(' ');
      return words.slice(0, 10).join(' ') + (words.length > 10 ? '...' : '');
    }

    function generateBullets(t) {
      const parts = t.split(/[.!?]/).filter(s => s.trim().length > 5);
      return parts.length > 0 ? parts.slice(0,3).map(s => s.trim()) : ["Key insight captured"];
    }

    function renderCards() {
      const filteredNotes = notes.filter(n => 
        n.transcript.toLowerCase().includes(searchTerm) || 
        n.summary.toLowerCase().includes(searchTerm)
      );

      cardsContainer.innerHTML = filteredNotes.map(note => `
        <div class="card">
          <div class="card-header">
            <span class="timestamp">${note.date}</span>
            <div class="card-actions">
              <button class="action-btn" onclick="copyNote(${note.id})">Copy</button>
              <button class="action-btn" onclick="editNote(${note.id})">Edit</button>
              <button class="action-btn btn-delete" onclick="deleteNote(${note.id})">Del</button>
            </div>
          </div>
          <div class="summary-text">${note.summary}</div>
          <ul class="points-list">${note.points.map(p => `<li>${p}</li>`).join('')}</ul>
          <div class="full-text">"${note.transcript}"</div>
        </div>
      `).join('');
      
      if(filteredNotes.length === 0 && searchTerm !== '') {
        cardsContainer.innerHTML = `<p style="text-align:center; color:var(--text-dim)">No notes match your search.</p>`;
      }
    }

    recordBtn.addEventListener('click', toggleRecording);
  </script>
</body>
</html>
